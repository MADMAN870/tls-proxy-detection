services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: tls-inspection-api
    ports:
      - "8000:8000"
    volumes:
      - ./config:/app/config:ro
      - tls_data:/data
    networks:
      - tls-network
    restart: unless-stopped
    environment:
      - API_KEY=${API_KEY:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  proxy:
    build:
      context: .
      dockerfile: Dockerfile.proxy
    container_name: tls-inspection-proxy
    ports:
      - "8082:8080"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - tls-network
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - ANALYZER_API_URL=http://api:8000
      - API_KEY=${API_KEY:-}
    cap_add:
      - NET_ADMIN
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(3); s.connect(('localhost',8080)); s.close()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  testsite:
    build:
      context: .
      dockerfile: Dockerfile.testsite
    container_name: tls-test-site
    ports:
      - "9000:9000"
    networks:
      - tls-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

  test-traffic:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: tls-test-traffic
    depends_on:
      proxy:
        condition: service_healthy
    networks:
      - tls-network
    profiles:
      - test
    environment:
      - HTTP_PROXY=http://proxy:8080
      - HTTPS_PROXY=http://proxy:8080
      - SSL_CERT_FILE=/app/scripts/mitmproxy-ca.pem
      - API_KEY=${API_KEY:-}
    entrypoint: ["python", "scripts/test_traffic.py"]

volumes:
  tls_data:

networks:
  tls-network:
    driver: bridge
